<!-- =====================================================
     VISITOR FOOTPRINT MAP
     File: _includes/visitor-map.html

     SETUP INSTRUCTIONS:
     1. Create a FREE Supabase project at https://supabase.com
     2. Run the SQL below in Supabase SQL Editor
     3. Replace YOUR_PROJECT and YOUR_ANON_KEY with your real values
     4. In _pages/home.md, add this line where you want the map to appear:
           (percent) include visitor-map.html (percent)

     SQL:
       create table visitor_locations (
         id bigint generated always as identity primary key,
         country text, city text, lat float, lng float,
         visited_at timestamptz default now()
       );
       alter table visitor_locations enable row level security;
       create policy "Allow anonymous insert"
         on visitor_locations for insert to anon with check (true);
       create policy "Allow anonymous select"
         on visitor_locations for select to anon using (true);
     ===================================================== -->

<style>
  #visitor-map-section {
    margin: 48px 0 32px;
    font-family: inherit;
  }
  #visitor-map-section h3 {
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: 4px;
    color: #333;
  }
  #visitor-map-section .map-subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 16px;
  }
  #map-container {
    position: relative;
    background: #f0f4f8;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e2e8f0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  #map-container svg {
    display: block;
    width: 100%;
    height: auto;
  }
  .country-base {
    fill: #d4dde8;
    stroke: #fff;
    stroke-width: 0.5px;
  }
  .visitor-dot {
    fill: #ef4444;
    stroke: #fff;
    stroke-width: 1.5px;
    opacity: 0.85;
  }
  .visitor-dot-ring {
    fill: none;
    stroke: #ef4444;
    stroke-width: 1px;
    opacity: 0.3;
  }
  #map-tooltip {
    position: absolute;
    background: rgba(15,23,42,0.88);
    color: #f1f5f9;
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 6px;
    pointer-events: none;
    display: none;
    white-space: nowrap;
    z-index: 10;
  }
  #map-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f4f8;
    font-size: 0.85rem;
    color: #94a3b8;
    z-index: 5;
    border-radius: 12px;
  }
  .map-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid #cbd5e1;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .you-are-here {
    fill: #f97316;
    stroke: #fff;
    stroke-width: 2px;
    animation: pulse-dot 2s ease-out infinite;
  }
  @keyframes pulse-dot {
    0%   { r: 5px; opacity: 1; }
    70%  { r: 9px; opacity: 0.3; }
    100% { r: 5px; opacity: 1; }
  }
</style>

<div id="visitor-map-section">
  <h3>&#127758; Visitor Footprints</h3>
  <p class="map-subtitle">
    <span id="visitor-count">...</span> visitors from around the world
  </p>
  <div id="map-container" style="min-height:260px">
    <div id="map-loading">
      <div class="map-spinner"></div> Loading visitor map&hellip;
    </div>
    <div id="map-tooltip"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
(function () {

  // ── CONFIGURATION: replace these two values ──────────────────────────────
  var SUPABASE_URL      = 'https://yocgiwmzqbqjnfixjfyt.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvY2dpd216cWJxam5maXhqZnl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTI5OTIsImV4cCI6MjA4ODg4ODk5Mn0.uzoZYPLkN-OQ9Z_RhY3D4Lt2tpq9UwyYirFmlZ08q_U';
  // ─────────────────────────────────────────────────────────────────────────

  var AUTH_HEADERS = {
    'apikey':        SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type':  'application/json'
  };

  // Step 1: load existing visitor records, then continue.
  // - cache: 'no-store' bypasses the browser HTTP cache.
  // - Prefer: count=exact tells PostgREST to return the true row
  //   count in the Content-Range header, even though only up to 1000
  //   rows (PostgREST's default page size) come back in the body.
  //   Without this, visitors.length tops out at 1000 and the counter
  //   freezes the moment the table grows past 1000.
  // - Defensive parsing so a non-2xx response (Supabase returns a
  //   JSON object on error, not an array) doesn't break downstream.
  fetch(SUPABASE_URL + '/rest/v1/visitor_locations?select=country,city,lat,lng',
        {
          headers: {
            'apikey':        SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type':  'application/json',
            'Prefer':        'count=exact'
          },
          cache: 'no-store'
        })
    .then(function (r) {
      if (!r.ok) {
        console.warn('[visitor-map] read failed:', r.status, r.statusText);
        return { total: 0, visitors: [] };
      }
      var range = r.headers.get('content-range') || '*/0';
      var total = parseInt(range.split('/')[1], 10) || 0;
      return r.json().then(function (visitors) {
        return { total: total, visitors: visitors };
      });
    })
    .catch(function (e) {
      console.warn('[visitor-map] read network error:', e);
      return { total: 0, visitors: [] };
    })
    .then(function (result) {
      var visitors = Array.isArray(result.visitors) ? result.visitors : [];
      geolocateAndRender(visitors, result.total || visitors.length);
    });


  function geolocateAndRender(visitors, totalCount) {

    // Always render the count first using just the historical data,
    // so Safari/ITP blocking the ipapi geolocation call doesn't leave
    // the count stuck on the "..." placeholder. Use the exact row
    // total from PostgREST's Content-Range header, not visitors.length
    // — that array tops out at the default page size (1000 rows).
    document.getElementById('visitor-count').textContent =
      totalCount.toLocaleString();

    // Step 2: detect current visitor location via IP
    fetch('https://ipapi.co/json/', { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) {
          console.warn('[visitor-map] geo lookup failed:', r.status);
          return null;
        }
        return r.json();
      })
      .catch(function (e)  {
        console.warn('[visitor-map] geo network error:', e);
        return null;
      })
      .then(function (geo) {

        var me = null;

        if (geo && geo.latitude && geo.longitude) {
          me = {
            lat:     geo.latitude,
            lng:     geo.longitude,
            country: geo.country_name,
            city:    geo.city
          };

          // Record this visit (fire-and-forget). Surface non-2xx
          // responses to the console so a silent RLS / auth failure
          // is debuggable instead of looking like the count is stuck.
          fetch(SUPABASE_URL + '/rest/v1/visitor_locations', {
            method:  'POST',
            cache:   'no-store',
            headers: {
              'apikey':        SUPABASE_ANON_KEY,
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
              'Content-Type':  'application/json',
              'Prefer':        'return=minimal'
            },
            body: JSON.stringify(me)
          })
          .then(function (r) {
            if (!r.ok) {
              console.warn('[visitor-map] insert failed:', r.status, r.statusText);
            }
          })
          .catch(function (e) {
            console.warn('[visitor-map] insert network error:', e);
          });
        }

        // Refresh the counter once we know whether the current view
        // is being recorded too. Add 1 for "me" so the current visitor
        // is reflected before the POST round-trips into the next read.
        document.getElementById('visitor-count').textContent =
          (totalCount + (me ? 1 : 0)).toLocaleString();

        drawMap(visitors, me);
      });
  }


  function drawMap(visitors, me) {

    var container = document.getElementById('map-container');
    var W = container.clientWidth || 800;
    var H = Math.round(W * 0.52);

    var svg = d3.select('#map-container')
      .append('svg')
      .attr('viewBox', '0 0 ' + W + ' ' + H)
      .attr('preserveAspectRatio', 'xMidYMid meet');

    var projection = d3.geoNaturalEarth1()
      .scale(W / 6.2)
      .translate([W / 2, H / 2]);

    var pathGen = d3.geoPath().projection(projection);

    // Graticule grid lines
    svg.append('path')
      .datum(d3.geoGraticule()())
      .attr('fill', 'none')
      .attr('stroke', '#c8d5e2')
      .attr('stroke-width', 0.3)
      .attr('d', pathGen);

    // Fetch and draw world map
    d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(function (world) {

        var features = topojson.feature(world, world.objects.countries).features;

        svg.selectAll('.land')
          .data(features)
          .join('path')
          .attr('class', 'country-base')
          .attr('d', pathGen);

        // Globe outline
        svg.append('path')
          .datum({ type: 'Sphere' })
          .attr('fill', 'none')
          .attr('stroke', '#b0c0d0')
          .attr('stroke-width', 0.8)
          .attr('d', pathGen);

        var tooltip = document.getElementById('map-tooltip');

        // Helper to add one visitor dot
        function addDot(lat, lng, city, country, isMe) {
          var xy = projection([lng, lat]);
          if (!xy) return;
          var x = xy[0];
          var y = xy[1];

          svg.append('circle')
            .attr('class', 'visitor-dot-ring')
            .attr('cx', x).attr('cy', y)
            .attr('r', isMe ? 10 : 7);

          svg.append('circle')
            .attr('cx', x).attr('cy', y)
            .attr('r', isMe ? 5 : 4)
            .attr('class', isMe ? 'you-are-here' : 'visitor-dot')
            .style('pointer-events', 'all')
            .style('cursor', 'pointer')
            .on('mousemove', function (event) {
              var label = city ? city + ', ' + country : country;
              var prefix = isMe ? '&#128205; You: ' : '&#128100; ';
              tooltip.innerHTML  = prefix + label;
              tooltip.style.display = 'block';
              var rect = container.getBoundingClientRect();
              tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
              tooltip.style.top  = (event.clientY - rect.top  - 28) + 'px';
            })
            .on('mouseleave', function () {
              tooltip.style.display = 'none';
            });
        }

        // Draw all historical visitors first
        visitors.forEach(function (v) {
          if (v.lat && v.lng) {
            addDot(v.lat, v.lng, v.city, v.country, false);
          }
        });

        // Draw current visitor on top
        if (me) {
          addDot(me.lat, me.lng, me.city, me.country, true);
        }

        document.getElementById('map-loading').remove();
      })
      .catch(function () {
        document.getElementById('map-loading').textContent = 'Map unavailable.';
      });
  }

}());
</script>
