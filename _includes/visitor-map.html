<!-- =====================================================
     VISITOR FOOTPRINT MAP
     File: _includes/visitor-map.html
     
     SETUP INSTRUCTIONS:
     1. Create a FREE Supabase project at https://supabase.com
     2. Run the SQL below to create the table
     3. Replace SUPABASE_URL and SUPABASE_ANON_KEY with your values
     4. Add {% include visitor-map.html %} to your _pages/home.md or index.html
     
     SQL to run in Supabase SQL Editor:
     ─────────────────────────────────────────────────────
     create table visitor_locations (
       id bigint generated always as identity primary key,
       country text,
       city text,
       lat float,
       lng float,
       visited_at timestamptz default now()
     );
     alter table visitor_locations enable row level security;
     create policy "Allow anonymous insert"
       on visitor_locations for insert to anon with check (true);
     create policy "Allow anonymous select"
       on visitor_locations for select to anon using (true);
     ===================================================== -->

<style>
  #visitor-map-section {
    margin: 48px 0 32px;
    font-family: inherit;
  }

  #visitor-map-section h3 {
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: 4px;
    color: #333;
  }

  #visitor-map-section .map-subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 16px;
  }

  #visitor-map-section .map-subtitle span {
    font-weight: 600;
    color: #555;
  }

  #map-container {
    position: relative;
    background: #f0f4f8;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e2e8f0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  #map-container svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .country-base {
    fill: #d4dde8;
    stroke: #fff;
    stroke-width: 0.5px;
    transition: fill 0.2s;
  }

  .country-visited {
    fill: #3b82f6;
    stroke: #fff;
    stroke-width: 0.5px;
    cursor: pointer;
    transition: fill 0.2s;
  }

  .country-visited:hover {
    fill: #1d4ed8;
  }

  .visitor-dot {
    fill: #ef4444;
    stroke: #fff;
    stroke-width: 1.5px;
    opacity: 0.85;
    pointer-events: none;
  }

  .visitor-dot-ring {
    fill: none;
    stroke: #ef4444;
    stroke-width: 1px;
    opacity: 0.3;
  }

  #map-tooltip {
    position: absolute;
    background: rgba(15, 23, 42, 0.88);
    color: #f1f5f9;
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 6px;
    pointer-events: none;
    display: none;
    white-space: nowrap;
    z-index: 10;
    backdrop-filter: blur(4px);
  }

  #map-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f4f8;
    font-size: 0.85rem;
    color: #94a3b8;
    z-index: 5;
    border-radius: 12px;
  }

  .map-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid #cbd5e1;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .you-are-here {
    fill: #f97316;
    stroke: #fff;
    stroke-width: 2px;
    animation: pulse-dot 2s ease-out infinite;
  }

  @keyframes pulse-dot {
    0%   { r: 5px; opacity: 1; }
    70%  { r: 9px; opacity: 0.3; }
    100% { r: 5px; opacity: 1; }
  }
</style>

<div id="visitor-map-section">
  <h3>🌍 Visitor Footprints</h3>
  <p class="map-subtitle">
    <span id="visitor-count">...</span> visitors from around the world
  </p>
  <div id="map-container" style="min-height:260px">
    <div id="map-loading">
      <div class="map-spinner"></div> Loading visitor map…
    </div>
    <div id="map-tooltip"></div>
  </div>
</div>

{% raw %}
<!-- D3 v7 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<!-- topojson -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
(async function () {

  /* ══════════════════════════════════════════════
     ▶  CONFIGURATION  — replace these values
     ══════════════════════════════════════════════ */
  const SUPABASE_URL      = 'https://yocgiwmzqbqjnfixjfyt.supabase.co';   // ← change
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvY2dpd216cWJxam5maXhqZnl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTI5OTIsImV4cCI6MjA4ODg4ODk5Mn0.uzoZYPLkN-OQ9Z_RhY3D4Lt2tpq9UwyYirFmlZ08q_U';                       // ← change
  /* ═════════════════════════════════════════════ */

  const HEADERS = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json'
  };

  // ── 1. Fetch existing visitor data ──────────────────────────────────────
  let visitors = [];
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/visitor_locations?select=country,city,lat,lng`,
      { headers: HEADERS }
    );
    visitors = await res.json();
  } catch(e) {
    console.warn('Could not load visitor data:', e);
  }

  // ── 2. Get current visitor's location (best-effort, silent on failure) ──
  let myLocation = null;
  try {
    const geo = await fetch('https://ipapi.co/json/');
    const d   = await geo.json();
    if (d.latitude && d.longitude) {
      myLocation = { lat: d.latitude, lng: d.longitude,
                     country: d.country_name, city: d.city };

      // Record visit (fire-and-forget)
      fetch(`${SUPABASE_URL}/rest/v1/visitor_locations`, {
        method: 'POST',
        headers: { ...HEADERS, 'Prefer': 'return=minimal' },
        body: JSON.stringify(myLocation)
      }).catch(() => {});
    }
  } catch(e) { /* silent */ }

  // Update counter
  const total = visitors.length + (myLocation ? 1 : 0);
  document.getElementById('visitor-count').textContent = total.toLocaleString();

  // ── 3. Draw the map ──────────────────────────────────────────────────────
  const container  = document.getElementById('map-container');
  const W          = container.clientWidth  || 800;
  const H          = Math.round(W * 0.52);

  const svg = d3.select('#map-container')
    .append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');

  const projection = d3.geoNaturalEarth1()
    .scale(W / 6.2)
    .translate([W / 2, H / 2]);

  const path = d3.geoPath().projection(projection);

  // Set of visited countries
  const visitedCountries = new Set(visitors.map(v => v.country));
  if (myLocation) visitedCountries.add(myLocation.country);

  // Load world topojson
  let world;
  try {
    world = await d3.json(
      'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'
    );
  } catch(e) {
    document.getElementById('map-loading').textContent = 'Map unavailable.';
    return;
  }

  // Draw graticule (grid lines)
  svg.append('path')
    .datum(d3.geoGraticule()())
    .attr('fill', 'none')
    .attr('stroke', '#c8d5e2')
    .attr('stroke-width', 0.3)
    .attr('d', path);

  // Draw countries
  const countries = topojson.feature(world, world.objects.countries).features;

  svg.selectAll('.land')
    .data(countries)
    .join('path')
    .attr('class', 'country-base')
    .attr('d', path);

  // Sphere outline
  svg.append('path')
    .datum({type:'Sphere'})
    .attr('fill','none')
    .attr('stroke','#b0c0d0')
    .attr('stroke-width', 0.8)
    .attr('d', path);

  // ── 4. Plot visitor dots ─────────────────────────────────────────────────
  const tooltip = document.getElementById('map-tooltip');

  function plotDot(lat, lng, city, country, isMe) {
    const proj = projection([lng, lat]);
    if (!proj) return;
    const [x, y] = proj;

    // pulse ring
    svg.append('circle')
      .attr('class', 'visitor-dot-ring')
      .attr('cx', x).attr('cy', y).attr('r', isMe ? 10 : 7);

    const dot = svg.append('circle')
      .attr('cx', x).attr('cy', y)
      .attr('r',  isMe ? 5 : 4)
      .attr('class', isMe ? 'you-are-here' : 'visitor-dot')
      .style('pointer-events', 'all')
      .style('cursor', 'pointer');

    dot.on('mousemove', function(event) {
      const label = city ? `${city}, ${country}` : country;
      tooltip.innerHTML = (isMe ? '📍 You are here: ' : '👤 ') + label;
      tooltip.style.display = 'block';
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
      tooltip.style.top  = (event.clientY - rect.top  - 28) + 'px';
    }).on('mouseleave', function() {
      tooltip.style.display = 'none';
    });
  }

  // Existing visitors
  visitors.forEach(v => {
    if (v.lat && v.lng) plotDot(v.lat, v.lng, v.city, v.country, false);
  });

  // Current visitor on top
  if (myLocation) {
    plotDot(myLocation.lat, myLocation.lng, myLocation.city, myLocation.country, true);
  }

  // Remove loading overlay
  document.getElementById('map-loading').remove();

})();
</script>
{% endraw %}
